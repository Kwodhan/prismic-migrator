<mat-toolbar color="primary">

  <span class="toolbar-title">Prismic Migrator</span>
  <a mat-button routerLink="/custom-type" routerLinkActive="active-link">
    <mat-icon>build</mat-icon>
    Custom Type
  </a>
  <a mat-button routerLink="/asset" routerLinkActive="active-link">
    <mat-icon>image</mat-icon>
    Asset
  </a>
  <a mat-button routerLink="/document" routerLinkActive="active-link">
    <mat-icon>description</mat-icon>
    Document
  </a>
  <span class="spacer"></span>
  <a mat-button routerLink="/" routerLinkActive="active-link">
    <mat-icon>home</mat-icon>
    Environments
  </a>

  @if (auth.claims(); as claims) {
    <button mat-button [matMenuTriggerFor]="userMenu" class="user-btn">
      <mat-icon>account_circle</mat-icon>
      <span class="user-label">{{ claims['name'] || claims['preferred_username'] || claims['email'] || claims['sub'] }}</span>
    </button>
    <mat-menu #userMenu="matMenu">
      <div class="user-menu-header">{{ claims['email'] }}</div>
      <mat-divider />
      <button mat-menu-item (click)="auth.logout()">
        <mat-icon>logout</mat-icon>
        Se déconnecter
      </button>
    </mat-menu>
  }

</mat-toolbar>

<router-outlet />
