<mat-toolbar class="mb-4 shadow-md" color="primary">
  <mat-icon class="mr-2">cloud_sync</mat-icon>
  <span class="font-semibold text-lg">Prismic Migrator</span>
</mat-toolbar>

@if (migrating()) {
  <mat-progress-bar mode="indeterminate" class="w-full" />
}

@if (loading()) {
  <div class="flex items-center justify-center h-full">
    <mat-progress-bar mode="indeterminate" class="w-64" />
  </div>
} @else {
  <div class="flex gap-4 h-full px-6 pb-6 overflow-hidden">

    <div class="flex-1 flex flex-col gap-4 overflow-y-auto bg-white rounded-xl shadow p-4">
      <h2 class="text-lg font-semibold text-gray-700 border-b pb-2 flex items-center gap-2">
        <mat-icon>folder</mat-icon> Source
      </h2>
      <app-asset-list [assets]="sourceAssets()" [draggable]="true" />
    </div>

    <div class="w-px bg-gray-200"></div>

    <div class="flex-1 flex flex-col gap-4 overflow-y-auto rounded-xl shadow p-4 transition-all duration-200"
         [class.bg-blue-50]="isDragOver()"
         [class.border-2]="isDragOver()"
         [class.border-blue-400]="isDragOver()"
         [class.border-dashed]="isDragOver()"
         [class.bg-white]="!isDragOver()"
         (dragover)="onDragOver($event)"
         (dragleave)="onDragLeave()"
         (drop)="onDrop($event)">
      <h2 class="text-lg font-semibold text-gray-700 border-b pb-2 flex items-center gap-2">
        <mat-icon>cloud_upload</mat-icon> Target
      </h2>

      @if (isDragOver()) {
        <div class="flex flex-col items-center justify-center flex-1 text-blue-400 gap-2">
          <mat-icon class="text-5xl">add_circle_outline</mat-icon>
          <span class="text-sm font-medium">Déposer pour migrer</span>
        </div>
      } @else {
        <app-asset-list [assets]="targetAssets()" />
      }
    </div>

  </div>
}
